<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Scanner PRO - Trần Đình Nhỡ</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.25/dist/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --success: #22c55e;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }
        
        #app { max-width: 600px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        
        header { padding: 1.5rem; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 100; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .logo h1 { font-size: 1.5rem; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .author-card { background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 12px; padding: 0.8rem; }
        .author-name { color: var(--primary-light); font-weight: 800; font-size: 1rem; margin-bottom: 0.2rem; }
        .author-details { font-size: 0.75rem; color: var(--text-muted); display: flex; flex-direction: column; }

        main { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; gap: 2rem; }
        
        .step-card { background: var(--card-bg); border-radius: var(--radius); padding: 1.5rem; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .step-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; color: var(--primary-light); }

        .field-row { display: flex; align-items: flex-end; gap: 0.75rem; margin-bottom: 1.25rem; }
        .field-group { flex: 1; display: flex; flex-direction: column; gap: 0.4rem; }
        .field-group label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; font-weight: 700; }
        .field-group input { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 0.9rem; border-radius: 10px; font-size: 1rem; width: 100%; }
        .field-group input:focus { border-color: var(--primary); outline: none; background: rgba(15, 23, 42, 0.8); }
        
        .btn-scan-trigger { background: var(--primary); color: white; border: none; width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; flex-shrink: 0; box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3); }
        .btn-scan-trigger:hover { transform: translateY(-2px); background: var(--primary-light); }
        .btn-scan-trigger.done { background: var(--success); box-shadow: 0 4px 10px rgba(34, 197, 94, 0.3); }

        /* Scanner Modal */
        #scanner-modal { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        #scanner-modal.open { display: flex; }
        
        .modal-header { padding: 1rem; display: flex; justify-content: space-between; align-items: center; background: rgba(30, 41, 59, 0.9); z-index: 10; }
        .viewport-container { position: relative; flex: 1; background: #000; overflow: hidden; }
        #reader, #crop-canvas { width: 100%; height: 100%; object-fit: contain; }
        #crop-canvas { position: absolute; top: 0; left: 0; display: none; }
        #selection-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }
        .selection-box { position: absolute; border: 3px solid #fff; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5), 0 0 15px var(--primary); pointer-events: none; }
        
        .modal-controls { padding: 1.5rem; background: var(--bg-dark); display: flex; flex-direction: column; gap: 1rem; z-index: 10; }
        .btn-action { padding: 1rem; border-radius: 50px; border: none; font-weight: 700; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .btn-main { background: var(--primary); color: white; }
        .btn-verify { background: var(--success); color: white; width: 100%; }
        
        .verify-box { background: var(--card-bg); padding: 1rem; border-radius: 12px; border: 1px solid var(--primary); display: none; flex-direction: column; gap: 0.8rem; }
        .verify-box.show { display: flex; }
        .verify-input { background: #000; border: 1px solid #444; color: #fbbf24; padding: 0.8rem; border-radius: 8px; font-size: 1.2rem; text-align: center; font-weight: 700; }

        .brightness-tool { display: flex; align-items: center; gap: 1rem; padding: 0.5rem; background: rgba(255,255,255,0.05); border-radius: 30px; }
        #brightness-slider { flex: 1; accent-color: var(--primary); }

        /* Login & Other */
        #login-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .login-card { background: var(--card-bg); padding: 2.5rem; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--primary); }
        .hidden { display: none !important; }
        #loading { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(99,102,241,0.2); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .table-container { background: var(--card-bg); border-radius: var(--radius); overflow: auto; margin-top: 1rem; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: var(--text-muted); text-transform: uppercase; font-size: 0.65rem; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <h2 style="margin-bottom: 2rem;">Chào mừng quay lại</h2>
            <button onclick="login('guest')" class="btn-action btn-main" style="width: 100%; margin-bottom: 1rem;"><i data-lucide="user"></i> Khách sử dụng</button>
            <div style="margin: 1.5rem 0; color: var(--text-muted); font-size: 0.8rem;">HOẶC</div>
            <input type="password" id="admin-pass" placeholder="Mật khẩu Admin" style="width: 100%; padding: 1rem; border-radius: 12px; background: #000; border: 1px solid #333; color: white; margin-bottom: 1rem; text-align: center;">
            <button onclick="login('admin')" class="btn-action btn-main" style="width: 100%; background: var(--success);"><i data-lucide="shield-check"></i> Đăng nhập Admin</button>
            
            <div style="margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
                <p style="font-size: 0.8rem; color: var(--primary-light); font-weight: 700;">Phát triển bởi K.s: Trần Đình Nhỡ</p>
                <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.3rem;">Đ.t: 0944 32 68 25</p>
            </div>
        </div>
    </div>

    <div id="app" class="hidden">
        <header>
            <div class="header-top">
                <div class="logo"><h1>Smart Scanner PRO</h1></div>
                <div class="actions" style="display: flex; align-items: center; gap: 0.8rem;">
                    <button id="btn-export-xlsx" title="Xuất Excel" style="background:none; border:none; color:#22c55e; cursor:pointer;"><i data-lucide="file-spreadsheet"></i></button>
                    <button id="btn-export-pdf" title="Xuất PDF" style="background:none; border:none; color:#ef4444; cursor:pointer;"><i data-lucide="file-text"></i></button>
                    <button id="btn-clear" title="Xóa dữ liệu" style="background:none; border:none; color:var(--text-muted); cursor:pointer;"><i data-lucide="trash-2"></i></button>
                </div>
            </div>
            <div class="author-card">
                <div class="author-name">K.s : Trần Đình Nhỡ</div>
                <div class="author-details">
                    <span><i data-lucide="phone" style="width:12px; display:inline;"></i> 0944 32 68 25</span>
                    <span><i data-lucide="map-pin" style="width:12px; display:inline;"></i> Tiên Sơn - Ninh Bình</span>
                </div>
            </div>
        </header>

        <main>
            <!-- BƯỚC 1 -->
            <section id="step-1-ui" class="step-card">
                <div class="step-title"><i data-lucide="file-text"></i> THÔNG TIN PHIẾU GỬI</div>
                
                <div class="field-row">
                    <div class="field-group"><label>Mã vận đơn</label><input type="text" id="in-waybill" placeholder="..."></div>
                    <button class="btn-scan-trigger" onclick="openScanner('waybill')"><i data-lucide="camera"></i></button>
                </div>
                <div class="field-row">
                    <div class="field-group"><label>Người gửi</label><input type="text" id="in-sender" placeholder="..."></div>
                    <button class="btn-scan-trigger" onclick="openScanner('sender')"><i data-lucide="camera"></i></button>
                </div>
                <div class="field-row">
                    <div class="field-group"><label>Số điện thoại</label><input type="text" id="in-phone" placeholder="..."></div>
                    <button class="btn-scan-trigger" onclick="openScanner('phone')"><i data-lucide="camera"></i></button>
                </div>
                <div class="field-row">
                    <div class="field-group"><label>Địa chỉ</label><input type="text" id="in-address" placeholder="..."></div>
                    <button class="btn-scan-trigger" onclick="openScanner('address')"><i data-lucide="camera"></i></button>
                </div>
                
                <button id="btn-next" class="btn-action btn-main" style="width:100%; margin-top:1rem;">Tiếp tục quét SP <i data-lucide="arrow-right"></i></button>
            </section>

            <!-- BƯỚC 2 -->
            <section id="step-2-ui" class="step-card hidden">
                <div class="step-title"><i data-lucide="package"></i> THÔNG TIN SẢN PHẨM</div>
                <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1rem;">Phiếu: <b id="cur-waybill">...</b></div>
                
                <div class="field-row">
                    <div class="field-group"><label>Mã Seri sản phẩm</label><input type="text" id="in-serial" placeholder="..."></div>
                    <button class="btn-scan-trigger" onclick="openScanner('serial')"><i data-lucide="camera"></i></button>
                </div>
                
                <div style="display: flex; gap: 1rem;">
                    <button onclick="saveProduct()" class="btn-action btn-main" style="flex:1; background: var(--success);"><i data-lucide="save"></i> Lưu SP</button>
                    <button onclick="finishWaybill()" class="btn-action btn-main" style="flex:1; background: var(--bg-dark); border:1px solid #444;"><i data-lucide="check-circle"></i> Hoàn tất</button>
                </div>
            </section>

            <section id="data-ui">
                <div class="step-title"><i data-lucide="database"></i> LỊCH SỬ QUÉT (<span id="total-count">0</span>)</div>
                <div class="table-container"><table id="log-table"><thead><tr><th>VD</th><th>Seri</th><th>Ảnh</th></tr></thead><tbody></tbody></table></div>
            </section>
        </main>
    </div>

    <!-- SCANNER MODAL -->
    <div id="scanner-modal">
        <div class="modal-header">
            <h3 id="scan-target-name">Quét thông tin</h3>
            <button onclick="closeScanner()" style="background:none; border:none; color:white;"><i data-lucide="x"></i></button>
        </div>
        
        <div class="viewport-container">
            <div id="reader"></div>
            <canvas id="crop-canvas"></canvas>
            <div id="selection-overlay"></div>
        </div>

        <div class="modal-controls">
            <div class="brightness-tool">
                <i data-lucide="sun" style="width:16px;"></i>
                <input type="range" id="brightness-slider" min="50" max="250" value="100">
            </div>

            <button id="btn-capture" class="btn-action btn-main"><i data-lucide="camera"></i> Chụp ảnh & Khoanh vùng</button>
            <button id="btn-retake" class="btn-action btn-main hidden" style="background:#444;"><i data-lucide="refresh-cw"></i> Chụp lại</button>

            <div id="verify-box" class="verify-box">
                <label style="font-size:0.7rem; color:var(--text-muted);">KẾT QUẢ NHẬN DIỆN (BẤM ĐỂ SỬA):</label>
                <input type="text" id="verify-input" class="verify-input">
                <div style="display: flex; gap: 0.5rem;">
                    <button id="btn-confirm-ok" class="btn-action btn-verify"><i data-lucide="check"></i> XÁC NHẬN ĐÚNG</button>
                </div>
            </div>
        </div>
    </div>

    <div id="loading"><div class="spinner"></div><p id="loading-text">Đang xử lý...</p></div>

    <script>
        lucide.createIcons();
        let state = {
            currentField: null,
            scannedData: JSON.parse(localStorage.getItem('scannedData') || '[]'),
            isCaptured: false,
            startX: 0, startY: 0, isDrawing: false,
            capturedImage: null,
            scanner: null
        };

        function login(role) {
            if(role === 'admin' && document.getElementById('admin-pass').value !== '1357924680') return alert("Sai mật khẩu!");
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            renderTable();
        }

        async function openScanner(field) {
            state.currentField = field;
            document.getElementById('scan-target-name').innerText = "Quét: " + getFieldName(field);
            document.getElementById('scanner-modal').classList.add('open');
            
            if(!state.scanner) state.scanner = new Html5Qrcode("reader");
            
            try {
                await state.scanner.start({ facingMode: "environment" }, { fps: 20 }, () => {});
            } catch(e) {
                await state.scanner.start({ facingMode: "user" }, { fps: 20 }, () => {});
            }

            // Brightness
            const slider = document.getElementById('brightness-slider');
            slider.oninput = (e) => {
                const video = document.querySelector('#reader video');
                if(video) video.style.filter = `brightness(${e.target.value}%) contrast(110%)`;
            };
        }

        function closeScanner() {
            if(state.scanner) state.scanner.stop();
            document.getElementById('scanner-modal').classList.remove('open');
            resetScannerUI();
        }

        function resetScannerUI() {
            document.getElementById('crop-canvas').style.display = 'none';
            document.getElementById('btn-capture').classList.remove('hidden');
            document.getElementById('btn-retake').classList.add('hidden');
            document.getElementById('verify-box').classList.remove('show');
            document.getElementById('selection-overlay').innerHTML = '';
            state.isCaptured = false;
        }

        document.getElementById('btn-capture').onclick = () => {
            const video = document.querySelector('#reader video');
            const canvas = document.getElementById('crop-canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.style.display = 'block';
            state.isCaptured = true;
            document.getElementById('btn-capture').classList.add('hidden');
            document.getElementById('btn-retake').classList.remove('hidden');
            if(state.currentField === 'serial') state.capturedImage = canvas.toDataURL('image/jpeg');
        };

        document.getElementById('btn-retake').onclick = resetScannerUI;

        // ROI Logic
        const cropCanvas = document.getElementById('crop-canvas');
        const overlay = document.getElementById('selection-overlay');
        
        function getCoords(e, canvas) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        cropCanvas.addEventListener('mousedown', startDraw);
        cropCanvas.addEventListener('touchstart', startDraw);
        window.addEventListener('mousemove', draw);
        window.addEventListener('touchmove', draw);
        window.addEventListener('mouseup', endDraw);
        window.addEventListener('touchend', endDraw);

        function startDraw(e) {
            if(!state.isCaptured) return;
            state.isDrawing = true;
            const coords = getCoords(e, cropCanvas);
            state.startX = coords.x; state.startY = coords.y;
        }

        function draw(e) {
            if(!state.isDrawing) return;
            const coords = getCoords(e, cropCanvas);
            const rect = cropCanvas.getBoundingClientRect();
            let box = document.getElementById('active-box');
            if(!box) {
                box = document.createElement('div'); box.id = 'active-box';
                box.className = 'selection-box'; overlay.appendChild(box);
            }
            const sX = state.startX * (rect.width/cropCanvas.width);
            const sY = state.startY * (rect.height/cropCanvas.height);
            const cX = coords.x * (rect.width/cropCanvas.width);
            const cY = coords.y * (rect.height/cropCanvas.height);
            
            box.style.left = Math.min(sX, cX) + 'px';
            box.style.top = Math.min(sY, cY) + 'px';
            box.style.width = Math.abs(cX - sX) + 'px';
            box.style.height = Math.abs(cY - sY) + 'px';
        }

        async function endDraw() {
            if(!state.isDrawing) return;
            state.isDrawing = false;
            const box = document.getElementById('active-box');
            if(!box) return;
            
            const rect = cropCanvas.getBoundingClientRect();
            const wR = cropCanvas.width / rect.width;
            const hR = cropCanvas.height / rect.height;
            const x = parseFloat(box.style.left) * wR;
            const y = parseFloat(box.style.top) * hR;
            const w = parseFloat(box.style.width) * wR;
            const h = parseFloat(box.style.height) * hR;
            
            if(w < 10) return;
            
            document.getElementById('loading').style.display = 'flex';
            const temp = document.createElement('canvas');
            temp.width = w; temp.height = h;
            const ctx = temp.getContext('2d');
            
            // Tiền xử lý ảnh để nhận dạng tốt hơn (Tăng tương phản)
            ctx.filter = 'grayscale(1) contrast(1.5) brightness(1.2)';
            ctx.drawImage(cropCanvas, x, y, w, h, 0, 0, w, h);
            
            try {
                let text = "";
                // Ưu tiên quét mã vạch/QR cho Mã vận đơn và Seri
                if(state.currentField === 'waybill' || state.currentField === 'serial') {
                    try { 
                        const result = await state.scanner.scanImage(temp, false);
                        if(result) text = result;
                    } catch(e) { console.log("Không tìm thấy mã vạch, chuyển sang OCR..."); }
                }

                // Nếu không quét được mã vạch hoặc là các trường văn bản khác
                if(!text) {
                    const worker = await Tesseract.createWorker('vie+eng');
                    const res = await worker.recognize(temp.toDataURL());
                    text = res.data.text.trim();
                    await worker.terminate();
                }
                
                // Nếu vẫn không có chữ hoặc chữ quá ngắn/vô nghĩa
                if(!text || text.length < 2) {
                    text = "Không nhận dạng được";
                    document.getElementById('btn-confirm-ok').classList.add('hidden');
                } else {
                    document.getElementById('btn-confirm-ok').classList.remove('hidden');
                }
                
                document.getElementById('verify-input').value = (state.currentField === 'phone') ? text.replace(/[^0-9]/g, '') : text;
                document.getElementById('verify-box').classList.add('show');
            } catch(e) { 
                alert("Lỗi hệ thống khi nhận diện!"); 
            }
            document.getElementById('loading').style.display = 'none';
        }

        document.getElementById('btn-confirm-ok').onclick = () => {
            const val = document.getElementById('verify-input').value;
            const fieldMap = {
                'waybill': 'in-waybill', 'sender': 'in-sender',
                'phone': 'in-phone', 'address': 'in-address', 'serial': 'in-serial'
            };
            document.getElementById(fieldMap[state.currentField]).value = val;
            closeScanner();
        };

        document.getElementById('btn-next').onclick = () => {
            if(!document.getElementById('in-waybill').value) return alert("Thiếu mã vận đơn!");
            document.getElementById('step-1-ui').classList.add('hidden');
            document.getElementById('step-2-ui').classList.remove('hidden');
            document.getElementById('cur-waybill').innerText = document.getElementById('in-waybill').value;
        };

        function saveProduct() {
            const data = {
                date: new Date().toLocaleDateString('vi-VN'),
                waybill: document.getElementById('in-waybill').value,
                sender: document.getElementById('in-sender').value,
                phone: document.getElementById('in-phone').value,
                address: document.getElementById('in-address').value,
                serial: document.getElementById('in-serial').value,
                image: state.capturedImage
            };
            state.scannedData.push(data);
            localStorage.setItem('scannedData', JSON.stringify(state.scannedData));
            document.getElementById('in-serial').value = '';
            state.capturedImage = null;
            renderTable();
            alert("Đã lưu sản phẩm!");
        }

        function finishWaybill() {
            document.getElementById('in-waybill').value = '';
            document.getElementById('in-sender').value = '';
            document.getElementById('in-phone').value = '';
            document.getElementById('in-address').value = '';
            document.getElementById('step-2-ui').classList.add('hidden');
            document.getElementById('step-1-ui').classList.remove('hidden');
        }

        function renderTable() {
            const body = document.querySelector('#log-table tbody');
            body.innerHTML = state.scannedData.slice().reverse().map(item => `
                <tr>
                    <td>${item.waybill}</td>
                    <td>${item.serial}</td>
                    <td><img src="${item.image||''}" style="width:30px;height:30px;object-fit:cover;border-radius:4px;"></td>
                </tr>
            `).join('');
            document.getElementById('total-count').innerText = state.scannedData.length;
        }

        document.getElementById('btn-export-xlsx').onclick = () => {
            if(state.scannedData.length === 0) return alert("Chưa có dữ liệu!");
            
            const exportData = state.scannedData.map((item, index) => ({
                "STT": index + 1,
                "Ngày": item.date,
                "Mã vận đơn": item.waybill,
                "Người gửi": item.sender,
                "Địa chỉ": item.address,
                "Số điện thoại": item.phone,
                "Seri sản phẩm": item.serial,
                "Hình ảnh": "Có (xem trong ứng dụng)"
            }));

            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new(); 
            XLSX.utils.book_append_sheet(wb, ws, "BaoCaoQuet");
            XLSX.writeFile(wb, "Bao_Cao_Quet_SmartScanner.xlsx");
        };

        document.getElementById('btn-export-pdf').onclick = () => {
            if(state.scannedData.length === 0) return alert("Chưa có dữ liệu!");
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4'); // Khổ ngang cho đủ cột
            
            doc.setFontSize(10); doc.setTextColor(100);
            doc.text("Tac gia: K.s Tran Dinh Nho - DT: 0944 32 68 25", 10, 200);
            
            doc.setFontSize(18); doc.setTextColor(0);
            doc.text("BAO CAO QUET MA VAN DON & SAN PHAM", 10, 15);
            
            const head = [['STT', 'Ngay', 'Ma VD', 'Nguoi gui', 'Dia chi', 'SDT', 'Seri']];
            const body = state.scannedData.map((i, idx) => [idx+1, i.date, i.waybill, i.sender, i.address, i.phone, i.serial]);
            
            doc.autoTable({
                head: head,
                body: body,
                startY: 25,
                styles: { fontSize: 8 }
            });

            // Thêm trang ảnh
            state.scannedData.forEach((i, idx) => {
                if(i.image) {
                    doc.addPage();
                    doc.setFontSize(12);
                    doc.text(`ANH SAN PHAM - STT: ${idx+1} - Ma VD: ${i.waybill}`, 10, 10);
                    doc.addImage(i.image, 'JPEG', 10, 20, 180, 135);
                }
            });
            
            doc.save("Bao_Cao_Quet_TranDinhNho.pdf");
        };

        document.getElementById('btn-clear').onclick = () => {
            if(confirm("Xóa hết dữ liệu?")) { state.scannedData = []; localStorage.clear(); renderTable(); }
        };

        function getFieldName(f) {
            const map = {'waybill':'Mã vận đơn', 'sender':'Người gửi', 'phone':'Số điện thoại', 'address':'Địa chỉ', 'serial':'Mã Seri'};
            return map[f] || f;
        }
    </script>
</body>
</html>
